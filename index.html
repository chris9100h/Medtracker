<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0D0D0D">
<title>MedTracker</title>
<style>

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { background: #0D0D0D; }
body {
background: #0D0D0D;
color: #fff;
font-family: -apple-system, ‘Helvetica Neue’, sans-serif;
-webkit-font-smoothing: antialiased;
min-height: 100vh;
min-height: 100dvh;
}

/* ── LAYOUT ── */
#view {
max-width: 430px;
margin: 0 auto;
padding: 24px 16px 100px;
min-height: 100dvh;
}

/* ── NAV ── */
#nav {
position: fixed;
bottom: 0;
left: 0;
right: 0;
height: calc(64px + env(safe-area-inset-bottom, 0px));
background: #111;
border-top: 1px solid #2a2a2a;
display: flex;
align-items: flex-start;
justify-content: center;
z-index: 999;
padding-top: 8px;
}
.nav-inner {
display: flex;
width: 100%;
max-width: 430px;
}
.nav-btn {
flex: 1;
display: flex;
flex-direction: column;
align-items: center;
gap: 3px;
background: none;
border: none;
cursor: pointer;
padding: 2px 0;
font-family: inherit;
}
.nav-btn .ni { font-size: 22px; line-height: 1; }
.nav-btn .nl { font-size: 10px; color: #555; font-weight: 500; }
.nav-btn.on .nl { color: #FF6B00; font-weight: 700; }
.nav-dot { width: 4px; height: 4px; border-radius: 2px; background: #FF6B00; display: none; margin-top: 1px; }
.nav-btn.on .nav-dot { display: block; }

/* ── TYPOGRAPHY ── */
.page-title { font-size: 34px; font-weight: 800; letter-spacing: -1px; color: #fff; }
.sub-text { font-size: 13px; color: #666; margin-top: 3px; }
.empty { color: #444; font-size: 14px; text-align: center; padding: 28px 0; }

/* ── BUTTONS ── */
.btn-orange {
background: #FF6B00;
color: #000;
border: none;
border-radius: 14px;
padding: 12px 18px;
font-size: 15px;
font-weight: 700;
font-family: inherit;
cursor: pointer;
}
.btn-save {
width: 100%;
background: #FF6B00;
color: #000;
border: none;
border-radius: 16px;
padding: 16px;
font-size: 17px;
font-weight: 700;
font-family: inherit;
cursor: pointer;
margin-top: 8px;
}

/* ── INPUTS ── */
input.field {
width: 100%;
background: #222;
border: 1px solid #333;
border-radius: 12px;
padding: 14px 16px;
font-size: 16px;
color: #fff;
font-family: inherit;
outline: none;
margin-bottom: 10px;
-webkit-appearance: none;
display: block;
}
input.field::placeholder { color: #555; }

/* ── TODAY ── */
.today-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.time-block { background: #1a1a1a; border-radius: 20px; margin-bottom: 14px; overflow: hidden; }
.time-hdr-btn {
width: 100%;
background: none;
border: none;
display: flex;
align-items: center;
justify-content: space-between;
padding: 16px 18px;
cursor: pointer;
font-family: inherit;
}
.time-left { display: flex; align-items: center; gap: 10px; }
.time-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.time-name { font-size: 16px; font-weight: 700; color: #fff; }
.time-badge { background: #252525; border-radius: 10px; padding: 2px 8px; font-size: 12px; color: #666; font-weight: 600; }
.time-right { display: flex; align-items: center; gap: 8px; }
.take-all {
background: #FF6B00;
color: #000;
border: none;
border-radius: 10px;
padding: 6px 12px;
font-size: 13px;
font-weight: 700;
font-family: inherit;
cursor: pointer;
}
.take-all.done { background: #2a2a2a; color: #FF6B00; }
.chevron { font-size: 18px; color: #444; transition: transform .2s; display: inline-block; }
.med-list { padding: 0 12px 12px; }
.med-row {
width: 100%;
display: flex;
align-items: center;
gap: 12px;
padding: 12px 8px;
background: none;
border: none;
border-bottom: 1px solid #222;
cursor: pointer;
font-family: inherit;
text-align: left;
}
.med-row:last-child { border-bottom: none; }
.med-row.taken { opacity: 0.4; }
.dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.med-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.med-nm { font-size: 16px; font-weight: 600; color: #fff; }
.med-nm.strike { text-decoration: line-through; color: #666; }
.med-ds { font-size: 13px; color: #666; }
.chk { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #333; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.chk.on { background: #FF6B00; border-color: #FF6B00; }
.chk.on::after { content: ‘✓’; color: #000; font-size: 13px; font-weight: 800; }

/* ── PROGRESS RING ── */
.ring-track { fill: none; stroke: #2a2a2a; stroke-width: 4; }
.ring-fill  { fill: none; stroke: #FF6B00; stroke-width: 4; stroke-linecap: round; transition: stroke-dasharray .4s; }
.ring-lbl   { fill: #FF6B00; font-size: 10px; font-weight: 800; font-family: -apple-system, sans-serif; }

/* ── CALENDAR ── */
.cal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.week-nav { background: none; border: none; font-size: 30px; color: #FF6B00; cursor: pointer; padding: 0 8px; line-height: 1; font-family: inherit; }
.day-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px; scrollbar-width: none; }
.day-strip::-webkit-scrollbar { display: none; }
.day-box {
flex-shrink: 0;
width: 52px;
background: #1a1a1a;
border: 2px solid transparent;
border-radius: 18px;
padding: 12px 0 10px;
display: flex;
flex-direction: column;
align-items: center;
gap: 5px;
cursor: pointer;
font-family: inherit;
}
.day-box.today { border-color: #FF6B00; }
.day-box.sel   { background: #FF6B00; }
.day-box .dn { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: .5px; }
.day-box.sel .dn { color: rgba(0,0,0,.5); }
.day-box .dd { font-size: 20px; font-weight: 800; color: #fff; line-height: 1; }
.day-box.today:not(.sel) .dd { color: #FF6B00; }
.day-box.sel .dd { color: #000; }
.ddots { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; max-width: 40px; min-height: 6px; }
.ddot  { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }

.detail-card { background: #1a1a1a; border-radius: 22px; overflow: hidden; margin-bottom: 16px; }
.detail-hdr  { background: #FF6B00; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.detail-tag  { font-size: 11px; font-weight: 700; color: rgba(0,0,0,.5); text-transform: uppercase; letter-spacing: .8px; }
.detail-date { font-size: 17px; font-weight: 800; color: #000; margin-top: 2px; }
.detail-num  { font-size: 28px; font-weight: 900; color: #000; line-height: 1; text-align: right; }
.detail-numlbl { font-size: 10px; font-weight: 700; color: rgba(0,0,0,.5); }
.detail-body { padding: 14px 16px 16px; }
.dt-section  { margin-bottom: 14px; }
.dt-time-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.dt-time-row span { font-size: 11px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: .5px; }
.dt-divider  { flex: 1; height: 1px; background: #222; }
.dt-med-row  { display: flex; align-items: center; gap: 12px; background: #222; border-radius: 14px; padding: 10px 14px; margin-bottom: 6px; }
.dt-status   { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 800; }
.dt-status.ok  { background: #FF6B00; color: #000; }
.dt-status.no  { background: #2a0800; color: #ff3300; }
.dt-status.fut { background: #2a2a2a; color: #444; }

/* ── INSIGHTS ── */
.stats3   { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
.stat-box { background: #1a1a1a; border-radius: 20px; padding: 16px 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.stat-val { font-size: 24px; font-weight: 800; color: #FF6B00; }
.stat-lbl { font-size: 11px; color: #666; text-align: center; font-weight: 500; }
.bar-wrap  { background: #1a1a1a; border-radius: 20px; padding: 18px; margin-bottom: 20px; }
.bar-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 16px; }
.bars      { display: flex; gap: 8px; align-items: flex-end; height: 90px; }
.bar-col   { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; }
.bar-track { flex: 1; width: 100%; background: #252525; border-radius: 8px; overflow: hidden; display: flex; align-items: flex-end; }
.bar-fill  { width: 100%; border-radius: 8px; min-height: 4px; transition: height .5s; }
.bar-lbl   { font-size: 11px; color: #666; font-weight: 600; }
.ms-card   { background: #1a1a1a; border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.prog      { height: 6px; background: #252525; border-radius: 3px; overflow: hidden; margin: 6px 0 4px; }
.prog-fill { height: 100%; border-radius: 3px; transition: width .5s; }

/* ── SCHEDULES ── */
.sched-item {
background: #1a1a1a;
border-radius: 18px;
padding: 16px;
display: flex;
align-items: flex-start;
gap: 12px;
margin-bottom: 12px;
cursor: pointer;
border: none;
width: 100%;
text-align: left;
font-family: inherit;
}
.badge { font-size: 12px; padding: 4px 10px; border-radius: 10px; font-weight: 600; display: inline-block; margin: 2px; }
.day-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.day-btn {
width: 38px; height: 38px;
border-radius: 12px;
border: 2px solid #333;
background: #222;
font-size: 12px;
font-weight: 600;
color: #666;
cursor: pointer;
font-family: inherit;
}
.day-btn.on { color: #000; border-color: transparent; }
.all-btn { background: none; border: none; color: #FF6B00; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; padding: 0; }

/* ── MEDS ── */
.med-card { background: #1a1a1a; border-radius: 20px; padding: 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.med-bar  { width: 5px; height: 50px; border-radius: 3px; flex-shrink: 0; }
.del-btn  { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; margin-left: auto; }
.color-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
.cswatch {
width: 36px; height: 36px; border-radius: 50%;
border: 3px solid transparent;
cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-size: 15px; font-weight: 800; color: #000;
font-family: inherit;
}
.cswatch.on { border-color: #fff; }

/* ── MODAL ── */
.modal-bg {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,.75);
z-index: 9999;
align-items: flex-end;
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
}
.modal-bg.open { display: flex; }
.modal-sheet {
background: #161616;
border-radius: 28px 28px 0 0;
padding: 28px 24px;
padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
width: 100%;
max-height: 85dvh;
overflow-y: auto;
}
.modal-sheet::-webkit-scrollbar { display: none; }
.modal-hdr   { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.modal-title { flex: 1; font-size: 22px; font-weight: 800; color: #fff; }
.close-btn {
background: #222; border: none;
width: 32px; height: 32px; border-radius: 50%;
font-size: 16px; color: #888; cursor: pointer;
display: flex; align-items: center; justify-content: center;
font-family: inherit;
}
.section-lbl { font-size: 14px; font-weight: 600; color: #666; margin-bottom: 10px; }

/* ── DEMO BANNER ── */
#demo-banner {
background: #FF6B00; color: #000;
text-align: center; padding: 10px 16px;
font-size: 13px; font-weight: 700;
display: none;
}

</style>
</head>
<body>

<div id="demo-banner">🔧 Demo mode — add your Supabase URL &amp; Key in the script</div>
<div id="view"></div>
<nav id="nav"><div class="nav-inner" id="nav-inner"></div></nav>

<div class="modal-bg" id="modal-med">
  <div class="modal-sheet">
    <div class="modal-hdr">
      <span class="modal-title" id="med-modal-title">Neues Medikament</span>
      <button class="close-btn" onclick="closeModal('modal-med')">✕</button>
    </div>
    <input class="field" id="f-name" placeholder="Name (e.g. Ibuprofen)">
    <input class="field" id="f-dose" placeholder="Dosage (e.g. 400mg)">
    <input class="field" id="f-notes" placeholder="Notes (optional)">
    <p class="section-lbl">Color</p>
    <div class="color-grid" id="color-grid"></div>
    <button class="btn-save" id="med-modal-save" onclick="submitMed()">Add</button>
  </div>
</div>

<div class="modal-bg" id="modal-sched">
  <div class="modal-sheet">
    <div class="modal-hdr">
      <div id="sm-dot" style="width:14px;height:14px;border-radius:50%;flex-shrink:0"></div>
      <span class="modal-title" id="sm-name"></span>
      <button class="close-btn" onclick="closeModal('modal-sched')">✕</button>
    </div>
    <div id="sm-body"></div>
    <button class="btn-save" onclick="submitSched()">Save</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
const SUPABASE_KEY = 'YOUR_ANON_KEY';
const DEMO = SUPABASE_URL.includes('YOUR_PROJECT');

const DAYS   = ['Mo','Tu','We','Th','Fr','Sa','Su'];
const TIMES  = ['morning','noon','evening'];
const TLABEL = { morning:'Morning', noon:'Noon', evening:'Evening' };
const TICON  = { morning:'☀️', noon:'🌤', evening:'🌙' };
const TCOLOR = { morning:'#FF6B00', noon:'#FF9233', evening:'#CC5500' };
const PAL    = ['#FF6B00','#FF8C00','#FFA500','#FFB347','#E55A00','#FF4500','#CC5500','#FF7F00','#D4622A','#FF9233'];
const alpha  = arr => [...arr].sort((a,b)=>a.name.localeCompare(b.name));

const S = {
  tab: 'today',
  meds: [], schedules: [], logs: [],
  open: { morning:true, noon:true, evening:true },
  calOffset: 0, calSel: isoToday(),
  pickedColor: PAL[0],
  schedMedId: null, schedEdit: {},
  schedOpen_planned: false, schedOpen_unplanned: true,
  delConfirm: null,
};

function isoToday() { return new Date().toISOString().split('T')[0]; }
function isoOf(d)   { return d.toISOString().split('T')[0]; }
function weekday(s) { return (new Date(s+'T12:00:00').getDay()+6)%7; }
function isTaken(medId, time, date) { return S.logs.some(l=>l.med_id===medId&&l.time_of_day===time&&l.date===date); }

function schedForDay(date) {
  const w=weekday(date), r={morning:[],noon:[],evening:[]};
  S.schedules.forEach(s=>{
    if(!s.days?.includes(w)) return;
    const m=S.meds.find(x=>x.id===s.med_id);
    if(m) r[s.time_of_day].push(m);
  });
  r.morning=alpha(r.morning); r.noon=alpha(r.noon); r.evening=alpha(r.evening);
  return r;
}
function dayStats(date) {
  const w=weekday(date);
  const sc=S.schedules.filter(s=>s.days?.includes(w));
  const tk=sc.filter(s=>S.logs.some(l=>l.med_id===s.med_id&&l.time_of_day===s.time_of_day&&l.date===date)).length;
  return {total:sc.length, taken:tk};
}

async function sb(method, path, body) {
  try {
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
      method,
      headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json',Prefer:method==='POST'?'return=representation':'return=minimal'},
      body:body?JSON.stringify(body):undefined
    });
    return r.ok?r.json().catch(()=>null):null;
  } catch{return null;}
}

function initDemo() {
  S.meds=[
    {id:1,name:'Ibuprofen',dose:'400mg',color:'#FF6B00',notes:'Take with food'},
    {id:2,name:'Vitamin D',dose:'1000 IU',color:'#FFB347',notes:''},
    {id:3,name:'Magnesium',dose:'300mg',color:'#CC5500',notes:'Evening'},
  ];
  S.schedules=[
    {id:1,med_id:1,days:[0,1,2,3,4,5,6],time_of_day:'morning'},
    {id:2,med_id:2,days:[0,1,2,3,4,5,6],time_of_day:'morning'},
    {id:3,med_id:3,days:[0,1,2,3,4,5,6],time_of_day:'evening'},
  ];
  let lid=1;
  for(let d=6;d>=0;d--){
    const dt=new Date(); dt.setDate(dt.getDate()-d);
    const date=isoOf(dt);
    S.schedules.forEach(s=>{if(Math.random()>.25) S.logs.push({id:lid++,med_id:s.med_id,time_of_day:s.time_of_day,date});});
  }
}

async function toggleLog(medId,time,date=isoToday()){
  const ex=S.logs.find(l=>l.med_id===medId&&l.time_of_day===time&&l.date===date);
  if(ex){
    if(!DEMO) await sb('DELETE',`intake_logs?id=eq.${ex.id}`);
    S.logs=S.logs.filter(l=>l.id!==ex.id);
  } else {
    const e={med_id:medId,time_of_day:time,date,taken_at:new Date().toISOString(),id:Date.now()};
    if(!DEMO){const r=await sb('POST','intake_logs',e);if(r?.[0])e.id=r[0].id;}
    S.logs.push(e);
  }
  render();
}
async function takeAll(time){
  const sc=schedForDay(isoToday());
  for(const m of sc[time]||[]) if(!isTaken(m.id,time,isoToday())) await toggleLog(m.id,time);
}

function makeRing(r,tk,tot){
  const c=2*Math.PI*r, pct=tot>0?tk/tot:0;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 44 44'); svg.setAttribute('width','64'); svg.setAttribute('height','64');
  const bg=document.createElementNS(ns,'circle');
  bg.setAttribute('cx','22');bg.setAttribute('cy','22');bg.setAttribute('r',r);bg.setAttribute('class','ring-track');
  const fg=document.createElementNS(ns,'circle');
  fg.setAttribute('cx','22');fg.setAttribute('cy','22');fg.setAttribute('r',r);fg.setAttribute('class','ring-fill');
  fg.setAttribute('stroke-dasharray',`${pct*c} ${c-pct*c}`);
  fg.setAttribute('stroke-dashoffset',c/4);
  const txt=document.createElementNS(ns,'text');
  txt.setAttribute('x','22');txt.setAttribute('y','26');txt.setAttribute('text-anchor','middle');txt.setAttribute('class','ring-lbl');txt.setAttribute('font-size','10');
  txt.textContent=`${tk}/${tot}`;
  svg.append(bg,fg,txt);
  return svg;
}
function makeMiniRing(tk,tot,sel=false){
  const r=10,c=2*Math.PI*r,pct=tot>0?tk/tot:0;
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox','0 0 28 28');svg.setAttribute('width','28');svg.setAttribute('height','28');
  const bg=document.createElementNS(ns,'circle');
  bg.setAttribute('cx','14');bg.setAttribute('cy','14');bg.setAttribute('r','10');
  bg.setAttribute('fill','none');bg.setAttribute('stroke',sel?'rgba(0,0,0,.2)':'#2a2a2a');bg.setAttribute('stroke-width','3');
  const fg=document.createElementNS(ns,'circle');
  fg.setAttribute('cx','14');fg.setAttribute('cy','14');fg.setAttribute('r','10');
  fg.setAttribute('fill','none');
  fg.setAttribute('stroke',sel?'rgba(0,0,0,.65)':(pct===1?'#FF6B00':pct>0?'#FF9233':'#333'));
  fg.setAttribute('stroke-width','3');
  fg.setAttribute('stroke-dasharray',`${pct*c} ${c-pct*c}`);
  fg.setAttribute('stroke-dashoffset',c/4);
  fg.setAttribute('stroke-linecap','round');
  const txt=document.createElementNS(ns,'text');
  txt.setAttribute('x','14');txt.setAttribute('y','18');txt.setAttribute('text-anchor','middle');
  txt.setAttribute('font-size','7');txt.setAttribute('font-weight','800');
  txt.setAttribute('fill',sel?'rgba(0,0,0,.65)':'#888');
  txt.textContent=`${tk}/${tot}`;
  svg.append(bg,fg,txt);
  return svg;
}

function render(){
  renderNav();
  const v=document.getElementById('view');
  v.innerHTML='';
  if(S.tab==='today')     v.append(renderToday());
  if(S.tab==='calendar')  v.append(renderCalendar());
  if(S.tab==='insights')  v.append(renderInsights());
  if(S.tab==='schedules') v.append(renderSchedules());
  if(S.tab==='meds')      v.append(renderMeds());
  v.scrollTop=0;
}

function renderNav(){
  const ni=document.getElementById('nav-inner');
  ni.innerHTML='';
  [['today','💊','Today'],['calendar','📅','Calendar'],['insights','📊','Insights'],['schedules','⏰','Schedules'],['meds','🩺','Meds']].forEach(([id,icon,lbl])=>{
    const btn=document.createElement('button');
    btn.className='nav-btn'+(S.tab===id?' on':'');
    btn.innerHTML=`<span class="ni">${icon}</span><span class="nl">${lbl}</span><span class="nav-dot"></span>`;
    btn.onclick=()=>{S.tab=id;render();};
    ni.append(btn);
  });
}

function renderToday(){
  const today=isoToday();
  const sc=schedForDay(today);
  const total=Object.values(sc).flat().length;
  const takenN=TIMES.reduce((a,t)=>a+sc[t].filter(m=>isTaken(m.id,t,today)).length,0);
  const now=new Date();
  const dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][now.getDay()];
  const dateStr=now.toLocaleDateString('en-US',{day:'numeric',month:'long'});
  const frag=document.createDocumentFragment();

  const hdr=document.createElement('div'); hdr.className='today-hdr';
  const left=document.createElement('div');
  left.innerHTML=`<p style="color:#666;font-size:14px;margin-bottom:2px">${dayName}, ${dateStr}</p><h1 class="page-title">Today</h1>`;
  hdr.append(left, makeRing(18,takenN,total));
  frag.append(hdr);

  TIMES.forEach(time=>{
    const meds=sc[time]||[];
    const tkN=meds.filter(m=>isTaken(m.id,time,today)).length;
    const allDone=meds.length>0&&tkN===meds.length;
    const isOpen=S.open[time];
    const block=document.createElement('div'); block.className='time-block';
    const hdrBtn=document.createElement('button'); hdrBtn.className='time-hdr-btn';
    hdrBtn.innerHTML=`
      <div class="time-left">
        <span class="time-dot" style="background:${TCOLOR[time]}"></span>
        <span class="time-name">${TICON[time]} ${TLABEL[time]}</span>
        <span class="time-badge">${tkN}/${meds.length}</span>
      </div>
      <div class="time-right">
        ${meds.length?`<button class="take-all${allDone?' done':''}" onclick="event.stopPropagation();takeAll('${time}')">${allDone?'✓ All':'Take All'}</button>`:''}
        <span class="chevron" style="transform:${isOpen?'rotate(180deg)':'rotate(0deg)'}">⌄</span>
      </div>`;
    hdrBtn.onclick=()=>{S.open[time]=!S.open[time];render();};
    block.append(hdrBtn);
    if(isOpen){
      const list=document.createElement('div'); list.className='med-list';
      if(!meds.length){
        list.innerHTML='<p style="color:#444;font-size:14px;text-align:center;padding:12px 0">No medications scheduled</p>';
      } else {
        meds.forEach(med=>{
          const tk=isTaken(med.id,time,today);
          const row=document.createElement('button'); row.className='med-row'+(tk?' taken':'');
          row.innerHTML=`
            <div class="dot" style="background:${med.color}"></div>
            <div class="med-info">
              <span class="med-nm${tk?' strike':''}">${med.name}</span>
              <span class="med-ds">${med.dose}</span>
            </div>
            <div class="chk${tk?' on':''}"></div>`;
          row.onclick=()=>toggleLog(med.id,time);
          list.append(row);
        });
      }
      block.append(list);
    }
    frag.append(block);
  });
  return frag;
}

function renderCalendar(){
  const todayStr=isoToday();
  const base=new Date(); base.setDate(base.getDate()+S.calOffset*7);
  const mon=new Date(base); mon.setDate(base.getDate()-((base.getDay()+6)%7));
  const week=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
  const frag=document.createDocumentFragment();

  const ch=document.createElement('div'); ch.className='cal-hdr';
  const wS=week[0].toLocaleDateString('de-DE',{day:'numeric',month:'short'});
  const wE=week[6].toLocaleDateString('de-DE',{day:'numeric',month:'short',year:'numeric'});
  ch.innerHTML=`
    <button class="week-nav" onclick="S.calOffset--;render()">‹</button>
    <div style="text-align:center"><h1 class="page-title">Calendar</h1><p class="sub-text">${wS} – ${wE}</p></div>
    <button class="week-nav" onclick="S.calOffset++;render()">›</button>`;
  frag.append(ch);

  const strip=document.createElement('div'); strip.className='day-strip';
  week.forEach((day,i)=>{
    const dateStr=isoOf(day);
    const isT=dateStr===todayStr, isSel=dateStr===S.calSel;
    const {total,taken:tk}=dayStats(dateStr);
    const cls=['day-box',isT?'today':'',isSel?'sel':''].filter(Boolean).join(' ');
    const box=document.createElement('button'); box.className=cls;
    box.innerHTML=`<span class="dn">${DAYS[i]}</span><span class="dd">${day.getDate()}</span>`;
    box.onclick=()=>{S.calSel=dateStr;render();};
    if(total>0){
      box.append(makeMiniRing(tk,total,isSel));
    } else {
      const ph=document.createElement('div');
      ph.style.cssText='width:28px;height:28px;display:flex;align-items:center;justify-content:center';
      ph.innerHTML=`<span style="font-size:9px;color:${isSel?'rgba(0,0,0,.4)':'#333'}">—</span>`;
      box.append(ph);
    }
    const dots=document.createElement('div'); dots.className='ddots';
    S.schedules.filter(s=>s.days?.includes(weekday(dateStr))).slice(0,4).forEach(s=>{
      const m=S.meds.find(x=>x.id===s.med_id);
      const t=S.logs.some(l=>l.med_id===s.med_id&&l.time_of_day===s.time_of_day&&l.date===dateStr);
      if(m){const d=document.createElement('div');d.className='ddot';d.style.background=t?(isSel?'rgba(0,0,0,.5)':m.color):(isSel?'rgba(0,0,0,.2)':'#333');dots.append(d);}
    });
    box.append(dots);
    strip.append(box);
  });
  frag.append(strip);

  const selStr=S.calSel, isFut=selStr>todayStr;
  const selDate=new Date(selStr+'T12:00:00');
  const tag=selStr===todayStr?'Today':isFut?'Upcoming':'Past';
  const dlabel=selDate.toLocaleDateString('en-US',{weekday:'long',day:'numeric',month:'long'});
  const {total:sT,taken:sTk}=dayStats(selStr);
  const selSc=schedForDay(selStr);

  const dc=document.createElement('div'); dc.className='detail-card';
  const dh=document.createElement('div'); dh.className='detail-hdr';
  dh.innerHTML=`<div><div class="detail-tag">${tag}</div><div class="detail-date">${dlabel}</div></div>${sT?`<div><div class="detail-num">${sTk}/${sT}</div><div class="detail-numlbl">TAKEN</div></div>`:''}`;
  dc.append(dh);
  const db=document.createElement('div'); db.className='detail-body';
  if(!sT){
    db.innerHTML='<p class="empty">No medications scheduled</p>';
  } else {
    TIMES.forEach(time=>{
      const meds=selSc[time]||[];
      if(!meds.length) return;
      const sec=document.createElement('div'); sec.className='dt-section';
      sec.innerHTML=`<div class="dt-time-row"><span>${TICON[time]} ${TLABEL[time].toUpperCase()}</span><div class="dt-divider"></div></div>`;
      meds.forEach(med=>{
        const tk=S.logs.some(l=>l.med_id===med.id&&l.time_of_day===time&&l.date===selStr);
        const sc2=tk?'ok':isFut?'fut':'no';
        const icon=tk?'✓':isFut?'·':'✗';
        const row=document.createElement('div'); row.className='dt-med-row';
        row.innerHTML=`
          <div class="dot" style="background:${med.color}"></div>
          <div style="flex:1">
            <span style="font-size:15px;font-weight:600;color:${tk?'#666':'#fff'};text-decoration:${tk?'line-through':'none'}">${med.name}</span>
            <span style="font-size:12px;color:#444;margin-left:8px">${med.dose}</span>
          </div>
          <div class="dt-status ${sc2}">${icon}</div>`;
        sec.append(row);
      });
      db.append(sec);
    });
  }
  dc.append(db);
  frag.append(dc);
  return frag;
}

function renderInsights(){
  const today=new Date();
  const todayStr=isoToday();
  // Build Mon–Sun of current week
  const mon=new Date(today); mon.setDate(today.getDate()-((today.getDay()+6)%7));
  const week7=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return isoOf(d);});
  // Stats over last 7 actual days for accuracy
  const last7=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-(6-i));return isoOf(d);});

  let totAll=0,tkAll=0;
  last7.forEach(date=>{
    const w=weekday(date),sc=S.schedules.filter(s=>s.days?.includes(w));
    totAll+=sc.length;
    tkAll+=S.logs.filter(l=>l.date===date&&sc.some(s=>s.med_id===l.med_id&&s.time_of_day===l.time_of_day)).length;
  });
  const rate=totAll>0?Math.round(tkAll/totAll*100):0;
  let streak=0;
  for(let i=last7.length-1;i>=0;i--){
    const date=last7[i],w=weekday(date),sc=S.schedules.filter(s=>s.days?.includes(w));
    if(!sc.length) continue;
    if(sc.every(s=>S.logs.some(l=>l.med_id===s.med_id&&l.time_of_day===s.time_of_day&&l.date===date))) streak++;
    else break;
  }

  const frag=document.createDocumentFragment();
  const th=document.createElement('div');
  th.innerHTML=`<h1 class="page-title">Insights</h1><p class="sub-text" style="margin-bottom:20px">This week</p>`;
  frag.append(th);

  const s3=document.createElement('div'); s3.className='stats3';
  s3.innerHTML=`
    <div class="stat-box"><span style="font-size:22px">🎯</span><span class="stat-val">${rate}%</span><span class="stat-lbl">Adherence rate</span></div>
    <div class="stat-box"><span style="font-size:22px">🔥</span><span class="stat-val">${streak}</span><span class="stat-lbl">Day streak</span></div>
    <div class="stat-box"><span style="font-size:22px">✅</span><span class="stat-val">${tkAll}</span><span class="stat-lbl">Taken</span></div>`;
  frag.append(s3);

  const bw=document.createElement('div'); bw.className='bar-wrap';
  bw.innerHTML='<p class="bar-title">Mon – Sun</p>';
  const bars=document.createElement('div'); bars.className='bars';
  week7.forEach((date)=>{
    const w=weekday(date),sc=S.schedules.filter(s=>s.days?.includes(w));
    const isFuture=date>todayStr;
    const r=(!isFuture&&sc.length)?Math.round(S.logs.filter(l=>l.date===date&&sc.some(s=>s.med_id===l.med_id&&s.time_of_day===l.time_of_day)).length/sc.length*100):0;
    const col=isFuture?'#2a2a2a':r>=80?'#FF6B00':r>=50?'#FF9233':'#3D1200';
    const isToday=date===todayStr;
    const bc=document.createElement('div'); bc.className='bar-col';
    bc.innerHTML=`<div class="bar-track"><div class="bar-fill" style="height:${r}%;background:${col}"></div></div><span class="bar-lbl" style="color:${isToday?'#FF6B00':'#666'};font-weight:${isToday?'800':'600'}">${DAYS[w]}</span>`;
    bars.append(bc);
  });
  bw.append(bars); frag.append(bw);

  const mt=document.createElement('p'); mt.style.cssText='font-size:16px;font-weight:700;margin-bottom:8px;color:#fff'; mt.textContent='Per Medication';
  frag.append(mt);
  alpha(S.meds).forEach(med=>{
    let t=0,tk=0;
    last7.forEach(date=>{
      const w=weekday(date),sc=S.schedules.filter(s=>s.med_id===med.id&&s.days?.includes(w));
      t+=sc.length; tk+=sc.filter(s=>S.logs.some(l=>l.med_id===med.id&&l.time_of_day===s.time_of_day&&l.date===date)).length;
    });
    const r=t?Math.round(tk/t*100):0, col=r>=80?'#FF6B00':r>=50?'#FF9233':'#3D1200';
    const mc=document.createElement('div'); mc.className='ms-card';
    mc.innerHTML=`
      <div class="dot" style="background:${med.color};width:14px;height:14px"></div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:15px;font-weight:600;color:#fff">${med.name}</span>
          <span style="font-size:15px;font-weight:700;color:${col}">${r}%</span>
        </div>
        <div class="prog"><div class="prog-fill" style="width:${r}%;background:${med.color}"></div></div>
        <span style="font-size:12px;color:#666">${tk} of ${t} taken</span>
      </div>`;
    frag.append(mc);
  });
  return frag;
}

function renderSchedules(){
  const frag=document.createDocumentFragment();
  const h1=document.createElement('h1'); h1.className='page-title'; h1.style.marginBottom='16px'; h1.textContent='Schedules';
  frag.append(h1);
  if(!S.meds.length){frag.append(Object.assign(document.createElement('p'),{className:'empty',textContent:'Add medications under "Meds" first.'}));return frag;}

  const planned   = alpha(S.meds.filter(m=>S.schedules.some(sc=>sc.med_id===m.id&&sc.days?.length>0)));
  const unplanned = alpha(S.meds.filter(m=>!S.schedules.some(sc=>sc.med_id===m.id&&sc.days?.length>0)));

  // Category tabs
  if(!S.schedCat) S.schedCat = unplanned.length ? 'unplanned' : 'planned';
  const tabBar=document.createElement('div');
  tabBar.style.cssText='display:flex;gap:8px;margin-bottom:20px';
  [['unplanned',`Unscheduled (${unplanned.length})`],['planned',`Scheduled (${planned.length})`]].forEach(([id,lbl])=>{
    const btn=document.createElement('button');
    const active=S.schedCat===id;
    btn.style.cssText=`flex:1;padding:10px;border-radius:12px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;background:${active?'#FF6B00':'#1a1a1a'};color:${active?'#000':'#555'}`;
    btn.textContent=lbl;
    btn.onclick=()=>{S.schedCat=id;render();};
    tabBar.append(btn);
  });
  frag.append(tabBar);

  const list = S.schedCat==='planned' ? planned : unplanned;

  if(!list.length){
    const empty=document.createElement('div');
    empty.style.cssText='text-align:center;padding:40px 24px;background:#1a1a1a;border-radius:20px';
    empty.innerHTML=S.schedCat==='unplanned'
      ? `<p style="font-size:32px;margin-bottom:12px">✅</p><p style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px">All scheduled</p><p style="font-size:13px;color:#555">All medications have a schedule.</p>`
      : `<p style="font-size:32px;margin-bottom:12px">📋</p><p style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px">No schedules yet</p><p style="font-size:13px;color:#555">Switch to "Unscheduled" to set up schedules.</p>`;
    frag.append(empty);
    return frag;
  }

  list.forEach(med=>{
    const badges=TIMES.map(t=>{
      const s=S.schedules.find(sc=>sc.med_id===med.id&&sc.time_of_day===t);
      if(!s||!s.days?.length) return '';
      const lbl=s.days.length===7?'Daily':s.days.map(d=>DAYS[d]).join(', ');
      return `${TICON[t]} ${lbl}`;
    }).filter(Boolean).join('  ·  ');

    const card=document.createElement('div');
    card.style.cssText='background:#1a1a1a;border-radius:16px;margin-bottom:10px;display:flex;align-items:stretch;overflow:hidden;cursor:pointer';
    card.onclick=()=>openSchedModal(med);

    const bar=document.createElement('div');
    bar.style.cssText=`width:4px;background:${med.color};flex-shrink:0`;

    const body=document.createElement('div');
    body.style.cssText='flex:1;padding:14px 14px 14px 16px;display:flex;align-items:center;gap:12px;min-width:0';

    const textBlock=document.createElement('div'); textBlock.style.cssText='flex:1;min-width:0';
    textBlock.innerHTML=`
      <p style="font-size:16px;font-weight:700;color:#fff;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${med.name}</p>
      <p style="font-size:13px;color:#666">${med.dose}${badges?`<span style="color:#888"> · ${badges}</span>`:'<span style="color:#444"> · No schedule set</span>'}</p>`;

    const arrow=document.createElement('span');
    arrow.style.cssText='font-size:18px;color:#333;flex-shrink:0';
    arrow.textContent='›';

    body.append(textBlock,arrow);
    card.append(bar,body);
    frag.append(card);
  });
  return frag;
}

    grid.append(sw);

async function submitMed(){
  const name=document.getElementById('f-name').value.trim(); if(!name) return;
  const data={name,dose:document.getElementById('f-dose').value.trim(),notes:document.getElementById('f-notes').value.trim(),color:S.pickedColor};
  if(S.editMedId){
    if(!DEMO) await sb('PATCH',`medications?id=eq.${S.editMedId}`,data);
    const idx=S.meds.findIndex(m=>m.id===S.editMedId);
    if(idx>=0) S.meds[idx]={...S.meds[idx],...data};
  } else {
    const med={...data,id:Date.now()};
    if(!DEMO){const r=await sb('POST','medications',med);if(r?.[0])med.id=r[0].id;}
    S.meds.push(med);
  }
  closeModal('modal-med'); render();
}
async function deleteMed(id){
  if(!DEMO) await sb('DELETE',`medications?id=eq.${id}`);
  S.meds=S.meds.filter(m=>m.id!==id); S.schedules=S.schedules.filter(s=>s.med_id!==id); S.logs=S.logs.filter(l=>l.med_id!==id);
  S.delConfirm=null; render();
}

function openSchedModal(med){
  S.schedMedId=med.id;
  document.getElementById('sm-dot').style.background=med.color;
  document.getElementById('sm-name').textContent=med.name;
  S.schedEdit={};
  TIMES.forEach(t=>{const ex=S.schedules.find(s=>s.med_id===med.id&&s.time_of_day===t);S.schedEdit[t]=[...(ex?.days||[])];});
  renderSchedBody(); openModal('modal-sched');
}
function renderSchedBody(){
  const body=document.getElementById('sm-body'); body.innerHTML='';
  TIMES.forEach(time=>{
    const sec=document.createElement('div'); sec.style.marginBottom='20px';
    sec.innerHTML=`<p style="font-size:15px;font-weight:700;color:#fff;margin-bottom:10px">${TICON[time]} ${TLABEL[time]}</p>`;
    const grid=document.createElement('div'); grid.className='day-grid';
    DAYS.forEach((d,i)=>{
      const on=S.schedEdit[time].includes(i);
      const btn=document.createElement('button'); btn.className='day-btn'+(on?' on':'');
      btn.style.background=on?TCOLOR[time]:'#222'; btn.textContent=d;
      btn.onclick=()=>{if(on)S.schedEdit[time]=S.schedEdit[time].filter(x=>x!==i);else S.schedEdit[time].push(i);renderSchedBody();};
      grid.append(btn);
    });
    sec.append(grid);
    const ab=document.createElement('button'); ab.className='all-btn';
    ab.textContent=S.schedEdit[time].length===7?'Deselect all':'Every day';
    ab.onclick=()=>{S.schedEdit[time]=S.schedEdit[time].length===7?[]:[0,1,2,3,4,5,6];renderSchedBody();};
    sec.append(ab); body.append(sec);
  });
}
async function submitSched(){
  const id=S.schedMedId;
  for(const t of TIMES){
    if(!DEMO){await sb('DELETE',`schedules?med_id=eq.${id}&time_of_day=eq.${t}`);if(S.schedEdit[t].length)await sb('POST','schedules',{med_id:id,time_of_day:t,days:S.schedEdit[t]});}
    S.schedules=S.schedules.filter(s=>!(s.med_id===id&&s.time_of_day===t));
    if(S.schedEdit[t].length) S.schedules.push({id:Date.now()+Math.random(),med_id:id,time_of_day:t,days:[...S.schedEdit[t]]});
  }
  closeModal('modal-sched'); render();
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-bg').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));

async function init(){
  if(DEMO){document.getElementById('demo-banner').style.display='block';initDemo();}
  else{
    const ago=new Date(); ago.setDate(ago.getDate()-30);
    const [m,s,l]=await Promise.all([sb('GET','medications?select=*&order=name'),sb('GET','schedules?select=*'),sb('GET',`intake_logs?select=*&date=gte.${isoOf(ago)}`)]);
    if(m)S.meds=m; if(s)S.schedules=s; if(l)S.logs=l;
  }
  render();
}
init();
</script>
